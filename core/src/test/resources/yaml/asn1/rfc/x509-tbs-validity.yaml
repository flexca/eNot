type: asn.1
attributes:
  tag: sequence
body:
  - type: system
    attributes:
      kind: condition
      expression: "date_time(${valid_from}) >= date_time('2050-01-01T00:00:00Z')"
    body:
      type: asn.1
      attributes:
        tag: generalized_time
      body: "${valid_from}"
  - type: system
    attributes:
      kind: condition
      expression: "date_time(${valid_from}) < date_time('2050-01-01T00:00:00Z')"
    body:
      type: asn.1
      attributes:
        tag: utc_time
      body: "${valid_from}"
  - type: system
    attributes:
      kind: condition
      expression: "date_time(${expires_on}) >= date_time('2050-01-01T00:00:00Z')"
    body:
      type: asn.1
      attributes:
        tag: generalized_time
      body: "${expires_on}"
  - type: system
    attributes:
      kind: condition
      expression: "date_time(${expires_on}) < date_time('2050-01-01T00:00:00Z')"
    body:
      type: asn.1
      attributes:
        tag: utc_time
      body: "${expires_on}"
